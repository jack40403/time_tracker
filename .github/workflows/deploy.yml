name: Build & Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build web
        run: flutter build web --release --pwa-strategy=none

      - name: Copy APK into web build
        run: cp build/app/outputs/flutter-apk/app-release.apk build/web/app-release.apk

      - name: Generate version.json
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\r')
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          cat > build/web/version.json <<EOF
          {
            "version": "$VERSION",
            "timestamp": "$TIMESTAMP",
            "url": "https://metimegoalgoal.web.app/app-release.apk"
          }
          EOF

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: wheredoesmytimego
          target: metimegoalgoal
          channelId: live
