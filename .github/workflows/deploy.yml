name: Build & Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "::error::Missing secret ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "::error::Missing secret ANDROID_KEY_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "::error::Missing secret ANDROID_KEY_ALIAS"; exit 1; }

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Verify release keystore
        run: |
          test -f android/app/upload-keystore.jks
          test -s android/key.properties

      - name: Calculate release metadata
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\r')
          VERSION_NAME=$(echo "$FULL_VERSION" | cut -d'+' -f1)
          BUILD_NUMBER=$(date +%s)
          SHORT_SHA=$(git rev-parse --short HEAD)
          APK_FILE_NAME="me-time-v${VERSION_NAME}-${BUILD_NUMBER}-${SHORT_SHA}.apk"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APK_FILE_NAME=$APK_FILE_NAME" >> $GITHUB_ENV
          echo "Using versionName/versionCode: $VERSION_NAME+$BUILD_NUMBER"

      - name: Build APK
        run: |
          flutter build apk --release --build-name=$VERSION_NAME --build-number=$BUILD_NUMBER

      - name: Build web
        run: flutter build web --release --pwa-strategy=none

      - name: Copy APK into web build
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "build/web/$APK_FILE_NAME"
          cp build/app/outputs/flutter-apk/app-release.apk build/web/app-release.apk

      - name: Generate version.json
        run: |
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          cat > build/web/version.json <<EOF
          {
            "version": "$VERSION_NAME",
            "buildNumber": "$BUILD_NUMBER",
            "url": "https://metimegoalgoal.web.app/$APK_FILE_NAME",
            "fallbackUrl": "https://metimegoalgoal.web.app/app-release.apk",
            "apkFileName": "$APK_FILE_NAME",
            "changelog": "v$VERSION_NAME (Build $BUILD_NUMBER): GitHub Actions release build.",
            "timestamp": "$TIMESTAMP"
          }
          EOF

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: wheredoesmytimego
          target: metimegoalgoal
          channelId: live
