name: Build & Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Calculate build number
        run: |
          BUILD_NUMBER=$(date +%s)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "Using Android versionCode/buildNumber: $BUILD_NUMBER"

      - name: Build APK
        run: |
          flutter build apk --release --build-number=$BUILD_NUMBER

      - name: Build web
        run: flutter build web --release --pwa-strategy=none

      - name: Copy APK into web build
        run: cp build/app/outputs/flutter-apk/app-release.apk build/web/app-release.apk

      - name: Generate version.json
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\r')
          VERSION_NAME=$(echo "$FULL_VERSION" | cut -d'+' -f1)
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          cat > build/web/version.json <<EOF
          {
            "version": "$VERSION_NAME",
            "buildNumber": "$BUILD_NUMBER",
            "url": "https://metimegoalgoal.web.app/app-release.apk",
            "changelog": "v$VERSION_NAME (Build $BUILD_NUMBER): GitHub Actions 自動構建更新",
            "timestamp": "$TIMESTAMP"
          }
          EOF

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: wheredoesmytimego
          target: metimegoalgoal
          channelId: live
