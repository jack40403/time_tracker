<title>Me Time · 開機動畫與主題探索</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Press+Start+2P&family=VT323&family=Quicksand:wght@400;500;600;700&family=Orbitron:wght@500;700;800&family=Caveat:wght@500;700&family=Patrick+Hand&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Fraunces:wght@500;700;800&family=Audiowide&display=swap" rel="stylesheet"/>
<style>
  html, body { margin:0; padding:0; background:#EAE6DC; font-family: 'Outfit', system-ui, sans-serif; color:#1d1d1f; }
  #root { width:100%; }

  @keyframes splash-pop-loop {
    0%   { transform: translateY(0) scale(0) rotate(-25deg); opacity: 0; }
    14%  { transform: translateY(0) scale(1.12) rotate(6deg); opacity: 1; }
    20%  { transform: translateY(0) scale(0.95) rotate(-2deg); opacity: 1; }
    25%  { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    35%  { transform: translateY(-5px) scale(1) rotate(0deg); opacity: 1; }
    45%  { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    55%  { transform: translateY(-5px) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes splash-pop-once {
    0%   { transform: scale(0) rotate(-25deg); opacity: 0; }
    55%  { transform: scale(1.12) rotate(6deg); opacity: 1; }
    78%  { transform: scale(0.95) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes splash-bob-only {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1) translateY(-5px); }
  }
  @keyframes splash-spark-loop {
    0%   { opacity: 0; transform: translate(-50%, 4px) scale(0.4); }
    10%  { opacity: 1; transform: translate(-50%, -6px) scale(1.1); }
    25%  { opacity: 0; transform: translate(-50%, -16px) scale(0.8); }
    100% { opacity: 0; transform: translate(-50%, -16px) scale(0.8); }
  }
  @keyframes splash-bubble-loop {
    0%   { transform: translate(0,0) scale(0); opacity: 0; }
    6%   { opacity: 1; }
    28%  { transform: var(--bubble-end) scale(1); opacity: 0; }
    100% { transform: var(--bubble-end) scale(1); opacity: 0; }
  }
  @keyframes splash-ring-loop {
    0%   { transform: scale(0.7); opacity: 0.6; }
    25%  { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1.6); opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/themes.jsx"></script>
<script type="text/babel" src="lib/bubbles.jsx"></script>
<script type="text/babel" src="lib/chrome.jsx"></script>
<script type="text/babel" src="lib/phone-frame.jsx"></script>
<script type="text/babel" src="lib/home-screen.jsx"></script>
<script type="text/babel" src="lib/screen-utils.jsx"></script>
<script type="text/babel" src="lib/screen-statistics.jsx"></script>
<script type="text/babel" src="lib/screen-goals.jsx"></script>
<script type="text/babel" src="lib/screen-history.jsx"></script>
<script type="text/babel" src="lib/screen-settings.jsx"></script>

<script type="text/babel" src="lib/splash.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
