<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Me Time">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=4">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png?v=4"/>

  <meta name="google-signin-client_id" content="216975115743-5bt9sc1b265u7t1fsbm78p21skkb11mi.apps.googleusercontent.com">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
  <title>Me Time</title>
  <link rel="manifest" href="pwa.json?v=4">
  <script>
    // Force reload when a new service worker is installed
    let refreshing = false;
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <audio id="silent-player" loop src="assets/silence.mp3" style="display:none;"></audio>
</body>
</html>
